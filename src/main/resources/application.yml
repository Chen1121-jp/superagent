spring:
  application:
    name: chen-ai-agent
  profiles:
    active: local
  sql:
    init:
      schema-locations: classpath:org/springframework/ai/chat/memory/repository/jdbc/schema-postgresql.sql
  ai:
    dashscope:
      chat:
        options:
          model: qwen-plus
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            platform: postgresql
  datasource:
    url: jdbc:postgresql://localhost:5432/chen_agent
    driver-class-name: org.postgresql.Driver

server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.chen.chenaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG